{{define "content"}}
<section class="hero">
  <h1>🌳 canopy</h1>
  {{if .Error}}<p class="notice conflict">{{.Error}}</p>{{end}}
  <form class="authform" method="post" action="/login">
    <input type="text" name="id" placeholder="아이디" autofocus autocomplete="username" required>
    <input type="password" name="password" placeholder="비밀번호" autocomplete="current-password" required>
    <button type="submit">로그인</button>
  </form>
</section>
{{end}}
